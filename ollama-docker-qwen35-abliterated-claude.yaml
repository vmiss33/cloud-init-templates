#cloud-config
# ollama rocm qwen 3.5 abliterated claude 35b

write_files:
  - path: /etc/docker/daemon.json
    permissions: '0644'
    content: |
      {
        "log-opts": {
          "max-size": "50m",
          "max-file": "3"
        }
      }

  - path: /root/post-install-notes.txt
    permissions: '0644'
    content: |
      Ollama MI300X Setup Complete

      Useful commands:
      - docker logs -f ollama
      - docker exec ollama ollama list
      - docker exec ollama ollama ps
      - curl http://localhost:11434/api/tags

      Environment variables passed:
      - HSA_OVERRIDE_GFX_VERSION=9.4.2
      - PYTORCH_ROCM_ARCH=gfx942

      Model location: /opt/ollama

runcmd:
  - |
    set -ex

    echo "=== Checking Docker ==="
    command -v docker
    systemctl start docker || true
    systemctl restart docker || true

    echo "=== Pulling latest Ollama ROCm Docker image ==="
    docker pull ollama/ollama:rocm

    echo "=== Removing old container if present ==="
    docker rm -f ollama || true

    echo "=== Starting Ollama container with MI300X ROCm support ==="
    docker run -d \
      --name ollama \
      --network=host \
      --ipc=host \
      --group-add=video \
      --group-add=render \
      --privileged \
      --cap-add=SYS_PTRACE \
      --security-opt seccomp=unconfined \
      --device /dev/kfd \
      --device /dev/dri \
      -e HSA_OVERRIDE_GFX_VERSION=9.4.2 \
      -e PYTORCH_ROCM_ARCH=gfx942 \
      -e OLLAMA_NUM_PARALLEL=4 \
      -v /opt/ollama:/root/.ollama \
      --restart=always \
      ollama/ollama:rocm

    echo "=== Waiting for Ollama to start ==="
    sleep 15

    echo "=== Container logs ==="
    docker logs ollama || true

    echo "=== Pulling model ==="
    docker exec ollama ollama pull huihui_ai/qwen3.5-abliterated:35b-Claude

    echo "=== Setup complete ==="
    docker ps
    curl http://localhost:11434/api/tags || true